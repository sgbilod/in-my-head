services:
  # Database Services
  postgres:
    image: postgres:15-alpine
    container_name: inmyhead-postgres
    environment:
      POSTGRES_DB: inmyhead_dev
      POSTGRES_USER: inmyhead
      POSTGRES_PASSWORD: inmyhead_dev_pass_change_in_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inmyhead"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inmyhead-network

  redis:
    image: redis:7-alpine
    container_name: inmyhead-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inmyhead-network

  # Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: inmyhead-qdrant
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - inmyhead-network

  # Object Storage
  minio:
    image: minio/minio:latest
    container_name: inmyhead-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    environment:
      MINIO_ROOT_USER: inmyhead
      MINIO_ROOT_PASSWORD: inmyhead_dev_pass_change_in_prod
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - inmyhead-network

  # AI Engine (Python) — core: RAG, ingestion, conversations, MCP
  ai-engine:
    build:
      context: ../../services/ai-engine
      dockerfile: Dockerfile.dev
    container_name: inmyhead-ai-engine
    ports:
      - "8001:8001"
    volumes:
      - ../../services/ai-engine:/app
      - ai_models:/models
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
      - QDRANT_URL=http://qdrant:6333
      - MODEL_CACHE_DIR=/models
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://inmyhead:inmyhead_dev_pass_change_in_prod@postgres:5432/inmyhead_dev
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-thenlper/gte-base}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-768}
      # Local-first; external LLM keys optional (no OpenAI per values rule)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: uvicorn src.main:app --reload --host 0.0.0.0 --port 8001
    networks:
      - inmyhead-network

  # Document Processor (Python) — parses PDF/DOCX/… then forwards to ai-engine
  document-processor:
    build:
      context: ../../services/document-processor
      dockerfile: Dockerfile.dev
    container_name: inmyhead-document-processor
    ports:
      - "8002:8002"
    volumes:
      - ../../services/document-processor:/app
      - document_cache:/app/cache
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
      - AI_ENGINE_URL=http://ai-engine:8001
    depends_on:
      - ai-engine
    command: uvicorn src.app:app --reload --host 0.0.0.0 --port 8002
    networks:
      - inmyhead-network

  # Monitoring (Optional for development)
  prometheus:
    image: prom/prometheus:latest
    container_name: inmyhead-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - inmyhead-network

  grafana:
    image: grafana/grafana:latest
    container_name: inmyhead-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - inmyhead-network

volumes:
  postgres_data:
    name: inmyhead_postgres_data
  redis_data:
    name: inmyhead_redis_data
  qdrant_data:
    name: inmyhead_qdrant_data
  minio_data:
    name: inmyhead_minio_data
  ai_models:
    name: inmyhead_ai_models
  document_cache:
    name: inmyhead_document_cache
  prometheus_data:
    name: inmyhead_prometheus_data
  grafana_data:
    name: inmyhead_grafana_data

networks:
  inmyhead-network:
    name: inmyhead-network
    driver: bridge
